name: Deploy docs (ui.sagtech.io)

# Build the apps/docs Next.js image and roll it out to ext-1. The library source
# lives at the repo ROOT (src/, tsup.config.ts, package.json) — not packages/ui —
# so changes there must also retrigger the docs build.
on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'src/**'
      - 'tsup.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Never run two deploys for the same ref at once.
concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sagtech-infra/sagtech-ui-docs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # buildx container driver — required for the gha build cache below
      # (the default docker driver can't export cache: "Cache export is not
      # supported for the docker driver").
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/docs/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/sagtech
            docker compose pull ui-docs
            docker compose up -d --no-deps ui-docs
            sleep 5
            docker compose ps ui-docs
